appId: com.jet.editor
productName: Jet
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
asar: true
asarUnpack:
  - "**/node-pty/**"
npmRebuild: false
mac:
  target:
    - dir
  category: public.app-category.developer-tools
  identity: null
win:
  target:
    - nsis
    - zip
linux:
  target:
    - AppImage
    - deb
  category: Development
