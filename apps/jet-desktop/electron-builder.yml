appId: com.jet.editor
productName: Jet
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
asar: true
asarUnpack:
  - "**/node-pty/**"
  - "**/@ff-labs/fff-bin-*/**"
  - "**/@ff-labs/fff-node/**"
npmRebuild: false
mac:
  target:
    - dir
  category: public.app-category.developer-tools
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
win:
  target:
    - nsis
    - zip
linux:
  target:
    - AppImage
    - deb
  category: Development
