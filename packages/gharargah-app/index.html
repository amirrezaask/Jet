<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self' http: https: ws: wss:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'"
    />
    <title>Gharargah</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("jet-color-scheme")
          var legacy = raw ? null : localStorage.getItem("jet-theme-id")
          var scheme = raw === "light" || raw === "dark"
            ? raw
            : legacy && /light/i.test(legacy) ? "light" : "dark"
          if (scheme === "dark") document.documentElement.classList.add("dark")
        } catch (_) {
          document.documentElement.classList.add("dark")
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
