<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jet</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("jet-color-scheme")
          var legacy = raw ? null : localStorage.getItem("jet-theme-id")
          var scheme = raw === "light" || raw === "dark"
            ? raw
            : legacy && /light/i.test(legacy) ? "light" : "dark"
          var dark = scheme === "dark"
          if (dark) document.documentElement.classList.add("dark")
          var vars = dark
            ? {
                "--background": "#000000",
                "--foreground": "#ededed",
                "--muted-foreground": "#a1a1a1",
              }
            : {
                "--background": "#ffffff",
                "--foreground": "#171717",
                "--muted-foreground": "#666666",
              }
          Object.keys(vars).forEach(function (k) {
            document.documentElement.style.setProperty(k, vars[k])
          })
        } catch (_) {
          document.documentElement.classList.add("dark")
          document.documentElement.style.setProperty("--background", "#000000")
          document.documentElement.style.setProperty("--foreground", "#ededed")
          document.documentElement.style.setProperty("--muted-foreground", "#a1a1a1")
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
